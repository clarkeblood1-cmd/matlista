<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Matlista</title>
<style>
:root {
  --bg1: #07122a;
  --bg2: #0a1636;
  --panel: rgba(255,255,255,0.04);
  --card: #010a23;
  --card2: #041030;
  --text: #ffffff;
  --muted: #cbd5e1;
  --green: #22c55e;
  --green-dark: #16a34a;
  --red: #ff4d4f;
  --chip: rgba(34,197,94,0.16);
  --chip-text: #86efac;
  --shadow: 0 10px 30px rgba(0,0,0,0.25);
  --radius: 20px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text);
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 18px 12px;
  font-size: 24px;
  font-weight: 700;
  background: rgba(0,0,0,0.25);
  box-shadow: var(--shadow);
}

.page {
  max-width: 1050px;
  margin: 0 auto;
  padding: 18px;
}

.summary-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}

.summary-box {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}

.summary-box div:first-child {
  font-size: 15px;
}

.summary-box strong {
  display: block;
  margin-top: 4px;
  font-size: 22px;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto auto 1fr auto;
  gap: 10px;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

input, select, button {
  min-height: 44px;
  border: none;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 14px;
}

input, select {
  background: #f8fafc;
  color: #111827;
}

button {
  background: var(--green);
  color: #03140a;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: var(--green-dark);
  color: #fff;
}

.ghost-btn {
  background: #22304f;
  color: #fff;
}

.search {
  width: 100%;
  margin-bottom: 14px;
}

.section {
  margin-top: 22px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.section-title {
  font-size: 26px;
  font-weight: 800;
}

.section-subtitle {
  color: var(--muted);
  font-size: 14px;
}

.container {
  display: grid;
  gap: 14px;
}

.subsection {
  margin-bottom: 18px;
}

.subsection-title {
  margin: 0 0 10px 0;
  font-size: 20px;
  font-weight: 800;
  color: #bfdbfe;
}

.empty {
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius);
  padding: 18px;
  text-align: center;
  color: var(--muted);
}

.card {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px;
  border-radius: var(--radius);
  background: linear-gradient(180deg, var(--card), var(--card2));
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: var(--shadow);
}

.card img {
  width: 110px;
  height: 110px;
  object-fit: contain;
  background: #fff;
  border-radius: 16px;
  padding: 8px;
  cursor: pointer;
}

.info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

.top-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.category {
  display: inline-flex;
  width: fit-content;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--chip);
  color: var(--chip-text);
  font-size: 12px;
  font-weight: 700;
}

.place-switcher {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
}

.place-btn {
  min-height: 36px;
  min-width: 36px;
  padding: 6px 8px;
  border-radius: 10px;
  background: #1e293b;
  color: white;
}

.place-btn.active {
  background: #2563eb;
  color: white;
}

.name {
  font-size: 20px;
  font-weight: 800;
  word-break: break-word;
}

.meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.quantity-wrap {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #86efac;
  font-weight: 700;
}

.quantity-wrap input {
  width: 68px;
  min-height: 38px;
  text-align: center;
  padding: 6px;
}

.price {
  color: #86efac;
  font-size: 18px;
  font-weight: 800;
}

.price-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.unit-price {
  color: var(--muted);
  font-size: 13px;
}

.missing-price {
  color: #f87171;
  font-weight: 700;
}

.info-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
}

.delete {
  background: var(--red);
  color: #fff;
  min-width: 44px;
}

.move-btn, .image-btn {
  width: auto;
}

.file-input {
  display: none;
}

#imageModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
}

#imageModal img {
  max-width: 92%;
  max-height: 92%;
  background: #fff;
  border-radius: 18px;
  padding: 10px;
}

#editModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  justify-content: center;
  align-items: center;
  z-index: 10000;
  padding: 20px;
}

.modal-box {
  background: #0b122b;
  color: white;
  width: min(520px, 100%);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.modal-grid {
  display: grid;
  gap: 10px;
}

@media (max-width: 980px) {
  .summary-bar { grid-template-columns: 1fr 1fr; }
  .controls { grid-template-columns: 1fr 1fr 1fr; }
}

@media (max-width: 700px) {
  header { font-size: 21px; }
  .page { padding: 12px; }
  .summary-bar { grid-template-columns: 1fr; }
  .controls { grid-template-columns: 1fr; }
  .section-header { flex-direction: column; align-items: flex-start; }
  .card {
    grid-template-columns: 90px 1fr;
    align-items: start;
  }
  .card img {
    width: 90px;
    height: 90px;
  }
  .actions {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: stretch;
  }
  .actions button { flex: 1; }
  .info-actions { flex-direction: column; }
  .info-actions button { width: 100%; }
}
</style>
</head>
<body>
<header>🛒 Min Matlista</header>

<div class="page">
  <div class="summary-bar">
    <div class="summary-box"><div>Varor hemma</div><strong id="homeCount">0</strong></div>
    <div class="summary-box"><div>Varor att köpa</div><strong id="buyCount">0</strong></div>
    <div class="summary-box"><div>Antal hemma</div><strong id="homeQty">0</strong></div>
    <div class="summary-box"><div>Kostnad att köpa</div><strong id="buyCost">0 kr</strong></div>
  </div>

  <input class="search" id="searchInput" placeholder="🔍 Sök vara, kategori eller plats..." oninput="render()">

  <div class="controls">
    <select id="itemCategory" onchange="suggestUnit()">
      <option value="MAT">MAT</option>
      <option value="GODIS">GODIS</option>
      <option value="DISK">DISK</option>
      <option value="TVÄTT">TVÄTT</option>
      <option value="TOALETT">TOALETT</option>
      <option value="STÄD">STÄD</option>
      <option value="KRYDDOR">KRYDDOR</option>
    </select>

    <select id="itemPlace">
      <option value="kyl">Kyl</option>
      <option value="frys">Frys</option>
      <option value="köksskåp">Köksskåp</option>
      <option value="kryddor">Kryddor</option>
    </select>

    <input id="itemName" placeholder="Ny vara...">
    <input id="itemPrice" type="number" min="0" placeholder="Pris (kr)">
    <input id="itemQuantity" type="number" min="0" placeholder="Hur mycket du har">

    <select id="itemUnit">
      <option value="st">st</option>
      <option value="g">g</option>
      <option value="kg">kg</option>
      <option value="ml">ml</option>
      <option value="l">l</option>
      <option value="pkt">pkt</option>
    </select>

    <input type="file" id="itemImage" class="file-input" accept="image/png, image/jpeg, image/webp">

    <button type="button" class="ghost-btn" onclick="pickGallery()">🖼️ Galleri</button>
    <button type="button" class="ghost-btn" onclick="pickCamera()">📷 Kamera</button>

    <select id="itemType">
      <option value="home">Har hemma</option>
      <option value="buy">Behöver köpa</option>
    </select>

    <button type="button" onclick="addItem()">➕ Lägg till</button>
  </div>

  <section class="section">
    <div class="section-header">
      <div class="section-title">⚡ Snabblista</div>
      <button type="button" class="ghost-btn" onclick="toggleQuickList()">Visa / Dölj</button>
      <div class="section-subtitle">Snabbt lägga till och ta bort vanliga saker</div>
    </div>

    <div class="controls" style="grid-template-columns: 1fr auto; margin-bottom:12px;">
      <input id="quickItemName" placeholder="Snabb vara...">
      <button type="button" onclick="addQuickItem()">➕ Lägg till</button>
    </div>

    <div class="container" id="quickList"></div>
  </section>

  <section class="section">
    <div class="section-header">
      <div class="section-title">🏠 Har hemma</div>
      <div class="section-subtitle">Uppdelat på kyl, frys, köksskåp och kryddor</div>
    </div>
    <div class="container" id="homeList"></div>
  </section>

  <section class="section">
    <div class="section-header">
      <div class="section-title">🛒 Behöver köpa</div>
      <div class="section-subtitle">Saker att fylla på</div>
    </div>
    <div class="container" id="buyList"></div>
  </section>
</div>

<div id="imageModal" onclick="this.style.display='none'">
  <img id="modalImg" alt="Stor bild">
</div>

<div id="editModal">
  <div class="modal-box">
    <h3 style="margin-top:0; margin-bottom:12px;">✏️ Ändra vara</h3>
    <div class="modal-grid">
      <input id="editName" placeholder="Namn">
      <input id="editPrice" type="number" min="0" placeholder="Pris">
      <input id="editQuantity" type="number" min="0" placeholder="Antal">

      <select id="editUnit">
        <option value="st">st</option>
        <option value="g">g</option>
        <option value="kg">kg</option>
        <option value="ml">ml</option>
        <option value="l">l</option>
        <option value="pkt">pkt</option>
      </select>

      <select id="editCategory">
        <option value="MAT">MAT</option>
        <option value="GODIS">GODIS</option>
        <option value="DISK">DISK</option>
        <option value="TVÄTT">TVÄTT</option>
        <option value="TOALETT">TOALETT</option>
        <option value="STÄD">STÄD</option>
        <option value="KRYDDOR">KRYDDOR</option>
      </select>

      <select id="editPlace">
        <option value="kyl">Kyl</option>
        <option value="frys">Frys</option>
        <option value="köksskåp">Köksskåp</option>
        <option value="kryddor">Kryddor</option>
      </select>

      <select id="editType">
        <option value="home">Har hemma</option>
        <option value="buy">Behöver köpa</option>
      </select>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" class="ghost-btn" style="flex:1;" onclick="closeEditModal()">Avbryt</button>
        <button type="button" style="flex:1;" onclick="saveEditItem()">Spara</button>
      </div>
    </div>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('matlista')) || [];
let quickItems = JSON.parse(localStorage.getItem('matlista_snabb')) || [];
let editingIndex = null;
let showQuick = JSON.parse(localStorage.getItem('matlista_showQuick') || 'true');

const homePlaces = [
  { key: 'kyl', label: '🧊 Kyl' },
  { key: 'frys', label: '❄️ Frys' },
  { key: 'köksskåp', label: '🗄️ Köksskåp' },
  { key: 'kryddor', label: '🌶️ Kryddor' }
];

function save() {
  localStorage.setItem('matlista', JSON.stringify(items));
  localStorage.setItem('matlista_snabb', JSON.stringify(quickItems));
  localStorage.setItem('matlista_showQuick', JSON.stringify(showQuick));
}

function pickGallery() {
  const input = document.getElementById('itemImage');
  input.removeAttribute('capture');
  input.click();
}

function pickCamera() {
  const input = document.getElementById('itemImage');
  input.setAttribute('capture', 'environment');
  input.click();
}

function resizeImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 100;
      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > maxSize) {
          height *= maxSize / width;
          width = maxSize;
        }
      } else {
        if (height > maxSize) {
          width *= maxSize / height;
          height = maxSize;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function updateSummary() {
  const homeItems = items.filter(i => i.type === 'home');
  const buyItems = items.filter(i => i.type === 'buy');

  document.getElementById('homeCount').textContent = homeItems.length;
  document.getElementById('buyCount').textContent = buyItems.length;
  document.getElementById('homeQty').textContent =
    homeItems.reduce((a, b) => a + Number(b.quantity || 0), 0);
  document.getElementById('buyCost').textContent =
    buyItems.reduce((a, b) => a + (Number(b.price || 0) * Number(b.quantity || 0)), 0) + ' kr';
}

function matchesSearch(item, search) {
  if (!search) return true;
  const hay = `${item.name || ''} ${item.category || ''} ${item.place || ''}`.toLowerCase();
  return hay.includes(search);
}

function createCard(item, source = 'items') {
  const realIndex = source === 'quick' ? quickItems.indexOf(item) : items.indexOf(item);
  const img = item.img || 'https://via.placeholder.com/100?text=Bild';
  const moveText = item.type === 'home' ? '↔ Flytta till köp' : '↔ Flytta till hemma';

  const div = document.createElement('div');
  div.className = 'card';

  if (source === 'quick') {
    div.innerHTML = `
      <img src="${img}" alt="${item.name}" onclick="showQuickImage(${realIndex})">
      <div class="info">
        <div class="top-tags">
          <div class="category">${item.category || 'MAT'}</div>
        </div>
        <div class="name">${item.name || ''}</div>
        <div class="meta">
          <div class="quantity-wrap">
            <span>${Number(item.quantity || 0)} ${item.unit || 'st'}</span>
          </div>
          <div class="price-block">
            ${Number(item.price || 0) > 0
              ? `<div class="unit-price">${Number(item.price || 0)} kr/${item.unit || 'st'}</div>
                 <div class="price">${Number(item.price || 0) * Number(item.quantity || 0)} kr</div>`
              : `<div class="unit-price missing-price">⚠️ Saknar pris</div>`}
          </div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="ghost-btn" onclick="useQuickItem(${realIndex})">Lägg till</button>
        <button type="button" class="delete" onclick="removeQuickItem(${realIndex})">🗑️</button>
      </div>
    `;
    return div;
  }

  div.innerHTML = `
    <img src="${img}" alt="${item.name}" onclick="showImage(${realIndex})">
    <div class="info">
      <div class="top-tags">
        <div class="category">${item.category || 'MAT'}</div>
        ${item.type === 'home' ? `
          <div class="place-switcher">
            <button type="button" class="place-btn ${item.place==='kyl'?'active':''}" onclick="changePlace(${realIndex}, 'kyl')">🧊</button>
            <button type="button" class="place-btn ${item.place==='frys'?'active':''}" onclick="changePlace(${realIndex}, 'frys')">❄️</button>
            <button type="button" class="place-btn ${item.place==='köksskåp'?'active':''}" onclick="changePlace(${realIndex}, 'köksskåp')">🗄️</button>
            <button type="button" class="place-btn ${item.place==='kryddor'?'active':''}" onclick="changePlace(${realIndex}, 'kryddor')">🌶️</button>
          </div>
        ` : ''}
      </div>

      <div class="name">${item.name || ''}</div>

      <div class="meta">
        <div class="quantity-wrap">
          <input type="number" min="0" value="${Number(item.quantity || 0)}" onchange="updateQuantity(${realIndex}, this.value)">
          <span>${item.unit || 'st'}</span>
        </div>
        <div class="price-block">
          ${Number(item.price || 0) > 0
            ? `<div class="unit-price">${Number(item.price || 0)} kr/${item.unit || 'st'}</div>
               <div class="price">${Number(item.price || 0) * Number(item.quantity || 0)} kr</div>`
            : `<div class="unit-price missing-price">⚠️ Saknar pris</div>`}
        </div>
      </div>

      <div class="info-actions">
        <button class="ghost-btn image-btn" type="button" onclick="changeImage(${realIndex})">🖼️ Byt bild</button>
        <button class="ghost-btn" type="button" onclick="editItem(${realIndex})">✏️ Ändra</button>
      </div>
    </div>

    <div class="actions">
      <button class="delete" type="button" onclick="removeItem(${realIndex})">🗑️</button>
      <button class="move-btn" type="button" onclick="moveItem(${realIndex})">${moveText}</button>
    </div>
  `;
  return div;
}

function renderHomeList(search) {
  const target = document.getElementById('homeList');
  target.innerHTML = '';

  let hasAny = false;

  homePlaces.forEach(place => {
    const filtered = items.filter(item =>
      item.type === 'home' &&
      item.place === place.key &&
      matchesSearch(item, search)
    );

    if (!filtered.length) return;
    hasAny = true;

    const section = document.createElement('div');
    section.className = 'subsection';
    section.innerHTML = `<div class="subsection-title">${place.label}</div>`;

    const wrap = document.createElement('div');
    wrap.className = 'container';
    filtered.forEach(item => wrap.appendChild(createCard(item)));
    section.appendChild(wrap);
    target.appendChild(section);
  });

  if (!hasAny) {
    target.innerHTML = '<div class="empty">Inga varor hemma här ännu.</div>';
  }
}

function renderBuyList(search) {
  const target = document.getElementById('buyList');
  target.innerHTML = '';

  const filtered = items.filter(item => item.type === 'buy' && matchesSearch(item, search));

  if (!filtered.length) {
    target.innerHTML = '<div class="empty">Inga varor att köpa just nu.</div>';
    return;
  }

  filtered.forEach(item => target.appendChild(createCard(item)));
}

function toggleQuickList() {
  showQuick = !showQuick;
  save();
  render();
}

function renderQuickList() {
  const target = document.getElementById('quickList');
  target.innerHTML = '';

  if (!showQuick) {
    target.innerHTML = '<div class="empty">Snabblistan är dold.</div>';
    return;
  }

  if (!quickItems.length) {
    target.innerHTML = '<div class="empty">Inga snabbvaror ännu.</div>';
    return;
  }

  quickItems.forEach(item => target.appendChild(createCard(item, 'quick')));
}

function addQuickItem() {
  const input = document.getElementById('quickItemName');
  const name = input.value.trim();
  if (!name) return;

  const exists = quickItems.find(i => i.name === name);
  if (!exists) {
    quickItems.push({
      name,
      price: 0,
      quantity: 1,
      unit: 'st',
      category: 'MAT',
      place: 'kyl',
      type: 'home',
      img: ''
    });
  }

  input.value = '';
  save();
  renderQuickList();
}

function removeQuickItem(index) {
  quickItems.splice(index, 1);
  save();
  renderQuickList();
}

function useQuickItem(index) {
  const item = quickItems[index];
  if (!item) return;
  items.push({ ...item });
  save();
  render();
}

function render() {
  renderQuickList();
  const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  renderHomeList(search);
  renderBuyList(search);
  updateSummary();
}

function clearInputs() {
  document.getElementById('itemName').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('itemQuantity').value = '';
  document.getElementById('itemImage').value = '';
  document.getElementById('itemType').value = 'home';
  document.getElementById('itemCategory').value = 'MAT';
  document.getElementById('itemPlace').value = 'kyl';
  document.getElementById('itemUnit').value = 'st';
}

function addItem() {
  const name = document.getElementById('itemName').value.trim();
  if (!name) return;

  const item = {
    name,
    price: Number(document.getElementById('itemPrice').value || 0),
    quantity: Number(document.getElementById('itemQuantity').value || 0),
    unit: document.getElementById('itemUnit').value,
    category: document.getElementById('itemCategory').value,
    place: document.getElementById('itemPlace').value,
    type: document.getElementById('itemType').value,
    img: ''
  };

  const file = document.getElementById('itemImage').files[0];

  if (file) {
    resizeImage(file, function(dataUrl) {
      item.img = dataUrl;
      items.push(item);
      save();
      render();
      clearInputs();
    });
  } else {
    items.push(item);
    save();
    render();
    clearInputs();
  }
}

function updateQuantity(index, value) {
  const qty = Math.max(0, Number(value || 0));
  items[index].quantity = qty;

  if (qty === 0) {
    items[index].type = 'buy';
  }

  save();
  render();
}

function changePlace(index, newPlace) {
  items[index].place = newPlace;
  save();
  render();
}

function moveItem(index) {
  items[index].type = items[index].type === 'home' ? 'buy' : 'home';
  save();
  render();
}

function removeItem(index) {
  items.splice(index, 1);
  save();
  render();
}

function editItem(index) {
  const item = items[index];
  editingIndex = index;
  document.getElementById('editName').value = item.name || '';
  document.getElementById('editPrice').value = Number(item.price || 0);
  document.getElementById('editQuantity').value = Number(item.quantity || 0);
  document.getElementById('editUnit').value = item.unit || 'st';
  document.getElementById('editCategory').value = item.category || 'MAT';
  document.getElementById('editPlace').value = item.place || 'kyl';
  document.getElementById('editType').value = item.type || 'home';
  document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editingIndex = null;
}

function saveEditItem() {
  if (editingIndex === null) return;

  items[editingIndex].name = document.getElementById('editName').value.trim() || items[editingIndex].name;
  items[editingIndex].price = Number(document.getElementById('editPrice').value || 0);
  items[editingIndex].quantity = Math.max(0, Number(document.getElementById('editQuantity').value || 0));
  items[editingIndex].unit = document.getElementById('editUnit').value;
  items[editingIndex].category = document.getElementById('editCategory').value;
  items[editingIndex].place = document.getElementById('editPlace').value;
  items[editingIndex].type = document.getElementById('editType').value;

  if (items[editingIndex].quantity === 0) {
    items[editingIndex].type = 'buy';
  }

  save();
  render();
  closeEditModal();
}

function changeImage(index) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/png, image/jpeg, image/webp';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    resizeImage(file, function(dataUrl) {
      items[index].img = dataUrl;
      save();
      render();
    });
  };
  input.click();
}

function suggestUnit() {
  const category = document.getElementById('itemCategory').value;
  if (category === 'KRYDDOR') {
    document.getElementById('itemUnit').value = 'g';
  } else if (category === 'MAT') {
    document.getElementById('itemUnit').value = 'st';
  }
}

function showImage(index) {
  const src = items[index]?.img;
  if (!src) return;
  document.getElementById('imageModal').style.display = 'flex';
  document.getElementById('modalImg').src = src;
}

function showQuickImage(index) {
  const src = quickItems[index]?.img;
  if (!src) return;
  document.getElementById('imageModal').style.display = 'flex';
  document.getElementById('modalImg').src = src;
}

render();
</script>
</body>
</html>
