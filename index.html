<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Matlista</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a1636;
  color:white;
}

header {
  text-align:center;
  padding:15px;
  font-size:22px;
  background:#0005;
}

.page { padding:10px; }

.controls {
  display:grid;
  gap:10px;
  margin-bottom:15px;
}

input,select,button {
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
}

.ghost-btn {
  background:#334155;
  color:white;
}

.card {
  display:flex;
  gap:10px;
  background:#111c44;
  padding:10px;
  border-radius:15px;
  margin-bottom:10px;
}

.card img {
  width:80px;
  height:80px;
  background:white;
  border-radius:10px;
}

</style>
</head>

<body>

<header>🛒 Min Matlista</header>

<div class="page">

<div class="controls">

<input id="itemName" placeholder="Namn">

<input type="file" id="itemImage" accept="image/png, image/jpeg, image/webp" style="display:none;">

<button onclick="pickGallery()">🖼️ Galleri</button>
<button onclick="pickCamera()">📷 Kamera</button>

<button onclick="addItem()">➕ Lägg till</button>

</div>

<div id="list"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem('matlista')) || [];

function save(){
  localStorage.setItem('matlista', JSON.stringify(items));
}

function pickGallery(){
  const input = document.getElementById('itemImage');
  input.removeAttribute('capture');
  input.click();
}

function pickCamera(){
  const input = document.getElementById('itemImage');
  input.setAttribute('capture','environment');
  input.click();
}

function resizeImage(file,callback){
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const size = 100;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,size,size);
      callback(canvas.toDataURL());
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function addItem(){
  const name = document.getElementById('itemName').value;
  const file = document.getElementById('itemImage').files[0];

  if(!name) return;

  const item = {name,img:''};

  if(file){
    resizeImage(file,(img)=>{
      item.img = img;
      items.push(item);
      save();
      render();
    });
  } else {
    items.push(item);
    save();
    render();
  }
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item,i)=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <img src="${item.img || 'https://via.placeholder.com/80'}">
      <div>${item.name}</div>
      <button onclick="removeItem(${i})">❌</button>
    `;

    list.appendChild(div);
  });
}

function removeItem(i){
  items.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html>
