<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min Matlista</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07122a">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#07122a;
  color:white;
}
header {
  padding:15px;
  text-align:center;
  font-size:22px;
  background:#0005;
}
.page { padding:10px; }

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
}

.card {
  background:#041030;
  padding:10px;
  border-radius:15px;
  margin-bottom:10px;
}

img {
  width:80px;
  height:80px;
  object-fit:contain;
  background:white;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 Matlista AI</header>

<div class="page">

<!-- LOGIN -->
<div style="margin-bottom:10px;">
  <button onclick="loginGoogle()">🔐 Logga in</button>
  <div id="loginStatus">Inte inloggad</div>
</div>

<!-- INPUT -->
<input id="itemName" placeholder="Vara">
<input id="itemPrice" type="number" placeholder="Pris">
<input id="itemQuantity" type="number" placeholder="Antal">

<select id="itemUnit">
  <option value="st">st</option>
  <option value="g">g</option>
  <option value="kg">kg</option>
</select>

<input type="file" id="itemImage" accept="image/*" capture="environment">
<button onclick="addItem()">➕ Lägg till</button>

<!-- LISTA -->
<div id="list"></div>

</div>

<script>
let items = JSON.parse(localStorage.getItem('matlista')) || [];
let tempImage = null;

function save(){
  localStorage.setItem('matlista', JSON.stringify(items));
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item,i)=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <img src="${item.img || ''}">
      <div>${item.name}</div>
      <div>${item.quantity} ${item.unit}</div>
      <button onclick="removeItem(${i})">🗑️</button>
    `;

    list.appendChild(div);
  });
}

function addItem(){
  const name = itemName.value.trim();
  if(!name) return;

  items.push({
    name,
    price:Number(itemPrice.value||0),
    quantity:Number(itemQuantity.value||0),
    unit:itemUnit.value,
    img:tempImage
  });

  tempImage=null;
  save();
  render();

  itemName.value='';
  itemPrice.value='';
  itemQuantity.value='';
}

function removeItem(i){
  items.splice(i,1);
  save();
  render();
}

function resizeImage(file, cb){
  const reader = new FileReader();
  reader.onload=e=>{
    cb(e.target.result);
  };
  reader.readAsDataURL(file);
}

/* 📸 AI + bild */
itemImage.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  resizeImage(file, async (dataUrl)=>{
    tempImage = dataUrl;

    try{
      const res = await detectAI(dataUrl.split(",")[1]);
      if(res?.suggestion){
        itemName.value = res.suggestion;
      } else {
        itemName.value = "Ny vara";
      }
    }catch(e){
      itemName.value = "Ny vara";
    }
  });
});

render();
</script>

<!-- 🔥 FIREBASE + AI -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyBt_-N8daItzu5JLMSOijx-a0QdXU3kDcG",
  authDomain: "matlist-app.firebaseapp.com",
  projectId: "matlist-app",
  storageBucket: "matlist-app.firebasestorage.app",
  messagingSenderId: "149796994583",
  appId: "1:149796994583:web:41113da82fa00001846652",
  measurementId: "G-W31SM71VQ6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const functions = getFunctions(app);

const provider = new GoogleAuthProvider();

window.loginGoogle = async ()=>{
  await signInWithPopup(auth, provider);
};

window.user=null;

onAuthStateChanged(auth, user=>{
  window.user=user;
  document.getElementById("loginStatus").innerText =
    user ? "Inloggad: "+user.displayName : "Inte inloggad";
});

window.detectAI = async (base64)=>{
  if(!window.user){
    alert("Logga in först!");
    return null;
  }

  const call = httpsCallable(functions, "detectProductName");
  const res = await call({imageBase64: base64});
  return res.data;
};
</script>

</body>
</html>
