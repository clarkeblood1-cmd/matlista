<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matlista</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #07122a;
      color: white;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: white;
      color: black;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .preview {
      margin-bottom: 12px;
    }

    .preview img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: white;
      border-radius: 12px;
      display: none;
    }

    .item {
      background: #0b122b;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      background: white;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
    }

    .delete-btn {
      width: auto;
      padding: 8px 10px;
      margin: 0;
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>

  <h1>🛒 Matlista</h1>

  <input id="itemName" placeholder="Namn på vara">

  <input id="itemImage" type="file" accept="image/*">

  <div class="preview">
    <img id="previewImg" alt="Förhandsvisning">
  </div>

  <button onclick="addItem()">➕ Lägg till</button>

  <div id="list"></div>

  <script>
    let items = JSON.parse(localStorage.getItem("matlista")) || [];
    let tempImage = "";

    const itemImage = document.getElementById("itemImage");
    const previewImg = document.getElementById("previewImg");
    const itemName = document.getElementById("itemName");
    const list = document.getElementById("list");

    function save() {
      localStorage.setItem("matlista", JSON.stringify(items));
    }

    function render() {
      list.innerHTML = "";

      items.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <img src="${item.img || ""}" alt="">
          <div class="item-info">
            <div><strong>${item.name}</strong></div>
          </div>
          <button class="delete-btn" onclick="removeItem(${index})">🗑️</button>
        `;

        list.appendChild(div);
      });
    }

    function removeItem(index) {
      items.splice(index, 1);
      save();
      render();
    }

    function resizeImage(file, callback) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const img = new Image();

        img.onload = function() {
          const canvas = document.createElement("canvas");
          const MAX = 300;

          let w = img.width;
          let h = img.height;

          if (w > h) {
            if (w > MAX) {
              h *= MAX / w;
              w = MAX;
            }
          } else {
            if (h > MAX) {
              w *= MAX / h;
              h = MAX;
            }
          }

          canvas.width = w;
          canvas.height = h;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);

          callback(canvas.toDataURL("image/jpeg", 0.8));
        };

        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }

    itemImage.addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      resizeImage(file, function(dataUrl) {
        tempImage = dataUrl;
        previewImg.src = dataUrl;
        previewImg.style.display = "block";
      });
    });

    function addItem() {
      const name = itemName.value.trim();

      if (!name) {
        alert("Skriv namn först");
        return;
      }

      items.push({
        name: name,
        img: tempImage
      });

      save();
      render();

      itemName.value = "";
      itemImage.value = "";
      tempImage = "";
      previewImg.src = "";
      previewImg.style.display = "none";
    }

    render();
  </script>

</body>
</html>
