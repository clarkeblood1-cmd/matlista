<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matlist</title>
<style>
/* (din CSS är oförändrad) */
</style>
</head>
<body>
<header>🛒 Matlist</header>

<div class="page">

  <!-- SNABBLISTA MED SÖK -->
  <section class="section">
    <div class="section-header">
      <div class="section-title">⚡ Snabblista</div>
      <button type="button" class="ghost-btn" onclick="toggleQuickList()">Visa / Dölj</button>
      <div class="section-subtitle">Snabbt lägga till och ta bort vanliga saker</div>
    </div>

    <div class="controls" style="grid-template-columns: 1fr 1fr auto; margin-bottom:12px;">
      <input id="quickItemName" placeholder="Snabb vara...">
      <input id="quickSearchInput" placeholder="🔍 Sök i snabblistan..." oninput="renderQuickList()">
      <button type="button" onclick="addQuickItem()">➕ Lägg till</button>
    </div>

    <div class="container" id="quickList"></div>
  </section>

</div>

<script>
let quickItems = JSON.parse(localStorage.getItem('matlista_snabb')) || [];
let showQuick = true;

function save() {
  localStorage.setItem('matlista_snabb', JSON.stringify(quickItems));
}

function toggleQuickList() {
  showQuick = !showQuick;
  renderQuickList();
}

function renderQuickList() {
  const target = document.getElementById('quickList');
  target.innerHTML = '';

  if (!showQuick) {
    target.innerHTML = '<div class="empty">Snabblistan är dold.</div>';
    return;
  }

  const search = (document.getElementById('quickSearchInput')?.value || '')
    .toLowerCase()
    .trim();

  const filtered = quickItems.filter(item => {
    if (!search) return true;
    const hay = `${item.name || ''}`.toLowerCase();
    return hay.includes(search);
  });

  if (!filtered.length) {
    target.innerHTML = '<div class="empty">Inga snabbvaror matchar sökningen.</div>';
    return;
  }

  filtered.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="info">
        <div class="name">${item.name}</div>
      </div>
      <div class="actions">
        <button onclick="useQuickItem(${index})">Lägg till</button>
        <button class="delete" onclick="removeQuickItem(${index})">🗑️</button>
      </div>
    `;

    target.appendChild(div);
  });
}

function addQuickItem() {
  const input = document.getElementById('quickItemName');
  const name = input.value.trim();
  if (!name) return;

  const exists = quickItems.find(i => i.name.toLowerCase() === name.toLowerCase());
  if (!exists) {
    quickItems.push({ name });
  }

  input.value = '';

  const quickSearch = document.getElementById('quickSearchInput');
  if (quickSearch) quickSearch.value = '';

  save();
  renderQuickList();
}

function removeQuickItem(index) {
  quickItems.splice(index, 1);
  save();
  renderQuickList();
}

function useQuickItem(index) {
  alert('Här kan du koppla till din riktiga lista');
}

// ENTER stöd
document.getElementById('quickItemName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addQuickItem();
});

renderQuickList();
</script>

</body>
</html>
